{% extends "base.html" %}
{% block title %}CV Tailor — Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="text-center mb-4">
      <i class="bi bi-file-earmark-person fs-1 text-primary d-block mb-2"></i>
      <h4 class="fw-bold mb-1">Create your account</h4>
      <p class="text-muted small">Tailor your CV to any job posting using AI</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Email address</label>
            <input type="email" class="form-control" name="email"
                   placeholder="you@example.com" required autofocus
                   value="{{ request.form.get('email', '') }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Password</label>
            <input type="password" class="form-control" name="password"
                   placeholder="At least 8 characters" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Confirm password</label>
            <input type="password" class="form-control" name="confirm_password"
                   placeholder="Repeat password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create Account</button>
          </div>
        </form>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Already have an account? <a href="/login">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
